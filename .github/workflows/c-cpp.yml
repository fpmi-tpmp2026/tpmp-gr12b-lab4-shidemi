name: C/C++ CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libsqlite3-dev sqlite3 gcovr

    - name: Build
      run: make all

    - name: Test
      run: make test

    - name: Coverage
      run: make coverage

    - name: distcheck
      run: make distcheck
